[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.4
    arduino-libraries/NTPClient@^3.2.1
    sensirion/Sensirion I2C SCD4x@^0.4.0
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    sparkfun/SparkFun VL53L5CX Arduino Library@^1.0.4
build_flags =
    -DINTERVAL_SEC=300
    ; STATION_ID is taken from secrets.h (SECRET_STATION_ID). If you want
    ; to override it per build env, uncomment and edit:
    ; -DSTATION_ID=2
